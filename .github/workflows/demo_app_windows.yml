name: Demo App Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/demo_app_windows.yml"
      - "plugins_platform/examples/demo_app/**"
      - "plugins_platform/packages/**"
  pull_request:
    paths:
      - ".github/workflows/demo_app_windows.yml"
      - "plugins_platform/examples/demo_app/**"
      - "plugins_platform/packages/**"

jobs:
  build-windows:
    name: Build Windows artifact
    runs-on: windows-latest
    defaults:
      run:
        working-directory: plugins_platform/examples/demo_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.38.7"
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Windows release
        run: flutter build windows --release

      - name: Build Windows installer
        run: dart run msix:create --build-windows false

      - name: Package Windows release
        shell: pwsh
        run: |
          $releaseDir = "build/windows/x64/runner/Release"
          $artifact = "demo_app-windows-x64.zip"
          $installer = "build/windows/installer/rss-reader-windows-x64.msix"

          if (!(Test-Path $releaseDir)) {
            throw "Release directory not found: $releaseDir"
          }

          if (!(Test-Path $installer)) {
            throw "MSIX installer not found: $installer"
          }

          Compress-Archive -Path "$releaseDir/*" -DestinationPath $artifact -Force

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo_app-windows-x64
          path: plugins_platform/examples/demo_app/demo_app-windows-x64.zip
          if-no-files-found: error

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: demo_app-windows-x64-msix
          path: plugins_platform/examples/demo_app/build/windows/installer/rss-reader-windows-x64.msix
          if-no-files-found: error
