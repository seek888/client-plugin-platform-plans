name: demo_app
description: Demo application for the Plugins Platform.
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.9
  plugins_platform:
    path: ../../packages/plugins_platform

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/plugins/work_calendar/
    - assets/plugins/work_calendar/dist/
    - assets/plugins/work_calendar/i18n/
