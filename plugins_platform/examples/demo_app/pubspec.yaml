name: rss_reader
description: Flutter RSS Client with Plugins Platform extensions.
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_widget_from_html_core: ^0.15.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_quill: ^10.8.0
  dart_quill_delta: ^10.8.0
  flutter_quill_delta_from_html: ^1.3.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5
  go_router: ^14.6.2
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  sqlite3: ^2.4.6
  path_provider: ^2.1.5
  path: ^1.9.1
  dart_rss: ^3.0.1
  xml: ^6.5.0
  http: ^1.2.2
  connectivity_plus: ^6.1.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  dartz: ^0.10.1
  uuid: ^4.5.1
  intl: any
  share_plus: ^10.1.3
  url_launcher: ^6.3.1
  file_picker: ^8.1.6
  flutter_local_notifications: ^18.0.1
  window_manager: ^0.4.3
  tray_manager: ^0.2.3
  local_notifier: ^0.1.6
  mobile_scanner: ^6.0.2
  charset_converter: ^2.3.0
  plugins_platform:
    path: ../../packages/plugins_platform

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  glados: ^1.1.1
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.2
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.22.1
  mockito: ^5.4.4
  build_test: ^2.2.2
  test: ^1.25.8
  msix: ^3.17.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/plugins/work_calendar/
    - assets/plugins/work_calendar/dist/
    - assets/plugins/work_calendar/i18n/

dependency_overrides:
  intl: ^0.20.2

msix_config:
  display_name: RSS Reader
  publisher_display_name: Seek888
  identity_name: seek888.rssreader
  msix_version: 1.0.0.0
  output_path: build/windows/installer
  output_name: rss-reader-windows-x64
  architecture: x64
  capabilities: internetClient
  install_certificate: false
